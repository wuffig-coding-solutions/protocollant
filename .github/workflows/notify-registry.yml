name: Notify registry

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch sha update to registry
        run: |
          gh api repos/${{ vars.REGISTRY_REPO }}/dispatches \
            --method POST \
            --field event_type=plugin-updated \
            --field 'client_payload[plugin]=protocollant' \
            --field 'client_payload[repo]=${{ github.repository }}' \
            --field 'client_payload[sha]=${{ github.sha }}'
        env:
          GH_TOKEN: ${{ secrets.REGISTRY_PAT }}
